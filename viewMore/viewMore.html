<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MangaNest</title>

    <link rel="stylesheet" href="viewMore.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon" />
  </head>
  <body>
    <div id="wrapper">
      <nav id="navbar">
        <div class="nav-left">
          <h2><a href="../index.html">MangaNest</a></h2>
        </div>

        <div class="nav-center">
          <div class="search-wrapper">
            <i class="fa fa-search" id="search-icon"></i>
            <input id="searchInput" placeholder="Search manga..." />
          </div>
          <div id="results" class="search-results"></div>
          <div id="settings"><p id="settings-icon">&#9776;</p></div>
        </div>

        <div class="nav-right">
          <a href="../login.html" id="signin">Sign In</a>
          <a href="#" id="logout">Sign Out</a>
          <p id="user-img"></p>
        </div>
      </nav>
      <div id="menu" class="menu"></div>
      <!-- filter  -->
      <div id="body">
        <div id="filterBox">
          <button id="applyFilter">OK, GO!</button>

          <div class="status">
            <label><input type="checkbox" value="complete" /> Completed</label>
            <label><input type="checkbox" value="publishing" /> Ongoing</label>
          </div>

          <div id="genreFilters"></div>
        </div>
        <div id="genre">
          <h2 id="title"></h2>
          <div id="genre-results"></div>
          <div id="pagination"></div>
        </div>
      </div>
      <!-- footer  -->
      <footer>
        <p>MangaNest @2026</p>
        <a href="#navbar"><i class="fa fa-arrow-up" id="top"></i></a>
      </footer>
      <script src="viewMore.js"></script>
    </div>
  </body>
</html>
